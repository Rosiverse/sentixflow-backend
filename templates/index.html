<!DOCTYPE html>
<html>
<head>
    <title>Mood-Based Movie Recommendation</title>
    <script>
        async function getRecommendations() {
            const mood = document.getElementById('mood').value;
            const response = await fetch('/recommend', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `mood=${encodeURIComponent(mood)}`
            });
            const data = await response.json();
            const resultDiv = document.getElementById('result');
            if (data.recommendations.length > 0) {
                resultDiv.innerHTML = "<h3>Recommended Movies:</h3><ul>"
                    + data.recommendations.map(m => `<li>${m}</li>`).join('') + "</ul>";
            } else {
                resultDiv.innerHTML = `<p>${data.message || 'No recommendations found.'}</p>`;
            }
        }
    </script>
</head>
<body>
    <h1>Mood-Based Movie Recommendation System</h1>
    <label for="mood">What is your mood right now to watch?</label>
    <input type="text" id="mood" placeholder="e.g., lonely, happy, sad">
    <button onclick="getRecommendations()">Get Recommendations</button>
    <div id="result"></div>
</body>
</html>
